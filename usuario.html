function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
}

function normalizarReservas(reservas){
    if(!Array.isArray(reservas)) return [];
    return reservas.map(r => typeof r === "string" ? {fecha:r, usuario:null} : r);
}

function crearMiniCalendario(disponibilidad=[], reservas=[], modoReserva=false) {
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    reservas = normalizarReservas(reservas);

    const container = document.createElement('div');
    container.style.marginTop = "10px";

    const header = document.createElement('div');
    header.classList.add('mini-calendar-header');

    const prevBtn = document.createElement('button');
    prevBtn.textContent = "<";
    const nextBtn = document.createElement('button');
    nextBtn.textContent = ">";

    const monthYearSpan = document.createElement('span');
    monthYearSpan.textContent = `${months[currentMonth]} ${currentYear}`;

    header.appendChild(prevBtn);
    header.appendChild(monthYearSpan);
    header.appendChild(nextBtn);

    container.appendChild(header);

    const table = document.createElement('table');
    table.classList.add('mini-calendar');

    function render() {
        table.innerHTML = "";
        const thead = document.createElement('thead');
        const trHead = document.createElement('tr');
        ['D','L','M','M','J','V','S'].forEach(dia => {
            const th = document.createElement('th');
            th.textContent = dia;
            trHead.appendChild(th);
        });
        thead.appendChild(trHead);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let date = 1;

        for(let i=0;i<6;i++){
            const tr = document.createElement('tr');
            for(let j=0;j<7;j++){
                const td = document.createElement('td');
                if(i===0 && j<firstDay){
                    td.textContent = '';
                } else if(date>daysInMonth){
                    td.textContent = '';
                } else {
                    const formatted = formatDate(new Date(currentYear, currentMonth, date));
                    td.textContent = date;

                    if(modoReserva){
                        if(reservas.some(r => r.fecha === formatted && r.usuario === usuarioActual)){
                            td.classList.add('reservado');
                        }
                    } else {
                        if(reservas.some(r => r.fecha === formatted)){
                            td.classList.add('reservado');
                        } else if(disponibilidad.includes(formatted)){
                            td.classList.add('disponible');
                        }
                    }

                    date++;
                }
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        monthYearSpan.textContent = `${months[currentMonth]} ${currentYear}`;
    }

    prevBtn.addEventListener('click', ()=>{ 
        currentMonth--; 
        if(currentMonth<0){ currentMonth=11; currentYear--; } 
        render(); 
    });
    nextBtn.addEventListener('click', ()=>{ 
        currentMonth++; 
        if(currentMonth>11){ currentMonth=0; currentYear++; } 
        render(); 
    });

    render();
    container.appendChild(table);
    return container;
}
function calcularPromedioInquilino() {
    const posts = JSON.parse(localStorage.getItem('localiar_posts') || '[]');
    let valoraciones = [];

    posts.forEach(post => {
        if(!post.reservas) return;

        post.reservas.forEach(r => {
            if(r.usuario === usuarioActual && r.valoracionPropietario){
                
                valoraciones.push(r.valoracionPropietario);
            }
        });
    });

    // Tomar solo las últimas 10
    valoraciones = valoraciones.slice(-10);

    if(valoraciones.length === 0){
        return 5; // todos empiezan con 5
    }

    const suma = valoraciones.reduce((acc, val) => acc + val, 0);
    return (suma / valoraciones.length);
}

function normalizarFecha(fechaStr) {
    const fecha = new Date(fechaStr);
    fecha.setHours(0, 0, 0, 0);
    return fecha;
}

function obtenerFechasReserva(reserva) {
    return (reserva.fechas || (reserva.fecha ? [reserva.fecha] : []))
        .map(f => normalizarFecha(f));
}

function publicacionSinInteraccion(post){

    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    // Revisar si tiene reservas futuras
    if(post.reservas){

        for(let r of post.reservas){

            const fechas = r.fechas || [r.fecha];

            for(let f of fechas){

                const fechaReserva = new Date(f);
                fechaReserva.setHours(0,0,0,0);

                if(fechaReserva >= hoy){
                    return false; // todavía hay algo con lo que interactuar
                }

            }

        }

    }

    // Si llegó acá → no hay reservas futuras ni interacción posible
    return true;

}

function verificarAvisoDesaparicion(post) {
    const hoy = new Date();
    hoy.setHours(0, 0, 0, 0);

    const fechasDisponibles = (post.fechasDisponibles || [])
        .map(f => normalizarFecha(f))
        .filter(f => f >= hoy);

    let ultimaFecha = null;

    if (fechasDisponibles.length > 0) {
        ultimaFecha = fechasDisponibles.sort((a, b) => a - b)[fechasDisponibles.length - 1];
    }

    (post.reservas || []).forEach(reserva => {
        const fechas = obtenerFechasReserva(reserva).filter(f => f >= hoy);
        if (fechas.length > 0) {
            const ultimaReserva = fechas.sort((a, b) => a - b)[fechas.length - 1];
            if (!ultimaFecha || ultimaReserva > ultimaFecha) {
                ultimaFecha = ultimaReserva;
            }
        }
    });

    if (!ultimaFecha) return false;

    const manana = new Date(hoy);
    manana.setDate(manana.getDate() + 1);

    return ultimaFecha.getTime() === manana.getTime();
}

    garantiaModal.style.display = 'none';
});

// Enviar garantía
garantiaSubmit.addEventListener('click', () => {
    const checkboxes = Array.from(garantiaModal.querySelectorAll('input[type=checkbox]:checked'));
    if(checkboxes.length === 0){
        alert("Selecciona al menos un motivo.");
        return;
    }
    const motivos = checkboxes.map(c => c.value);
    const comentario = document.getElementById('garantia-comentario').value.trim();
    const imagenes = document.getElementById('garantia-imagenes').files;

    // Guardamos todo en localStorage para admin
    const garantiaData = {
        motivos,
        comentario,
        imagenes: Array.from(imagenes).map(f => f.name), // solo nombres para simular
        post: garantiaContext.post,
        reserva: garantiaContext.reserva,
        fecha: new Date().toISOString()
    };

    // Guardar en un array
    const garantias = JSON.parse(localStorage.getItem('garantias') || '[]');
    garantias.push(garantiaData);
    localStorage.setItem('garantias', JSON.stringify(garantias));

    alert("Garantía enviada correctamente.");
    garantiaModal.style.display = 'none';
});
</script>


</body>
</html>
