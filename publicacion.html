<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de la Publicación - Localiar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .slider {
      position: relative;
      max-width: 600px;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 10px;
    }
    .slides img {
      width: 100%;
      display: none;
    }
    .slides img.active {
      display: block;
    }
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 50%;
    }
    .prev { left: 10px; }
    .next { right: 10px; }

    .publication-info { max-width: 600px; margin: 120px auto 50px; padding:20px; background:#fff; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    .publication-info p { margin: 5px 0; }

    .calendar-container { max-width: 600px; margin: 20px auto; }
    .precio-total { font-weight: bold; margin-top: 10px; font-size:1.1em; }

    .left-banner, .right-banner {
      position: fixed;
      top: 60px;
      width: 80px;
      height: calc(100% - 60px);
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-align: center;
      font-weight: bold;
      z-index: 500;
    }
    .left-banner { left: 0; }
    .right-banner { right: 0; }

    .favorite-btn {
      font-size: 1.5rem;
      cursor: pointer;
      color: #ccc;
      margin-left: 10px;
      vertical-align: middle;
      transition: color 0.2s;
    }
    .favorite-btn.favorito {
      color: red;
    }

    /* Botón usuario activo en header */
    .header .user-btn {
        background-color: #fff;
        color: #3483fa;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        margin-left: auto;
    }

    /* Estilos para preguntas */
    #preguntas-container {
      max-width: 600px;
      margin: 30px auto;
      padding: 15px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .pregunta-item {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
    .pregunta-item p {
      margin: 2px 0;
    }
    .pregunta-item .timestamp {
      font-size: 0.75em;
      color: #888;
      margin-left: 5px;
    }
    .respuesta-btn {
      background:#3483fa;
      color:#fff;
      border:none;
      border-radius:4px;
      padding:4px 8px;
      cursor:pointer;
      font-size:0.85em;
      margin-top:5px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">Localiar</div>
    <button class="user-btn" id="user-active-btn"></button>
  </header>

  <div class="left-banner">Publicidad</div>
  <div class="right-banner">Publicidad</div>

  <main class="publication-info">
    <h2 id="title"></h2>
    <span id="favorite-btn" class="favorite-btn">&#9825;</span>
    <p><strong>Rubro:</strong> <span id="rubro"></span></p>
    <p><strong>Provincia:</strong> <span id="provincia"></span></p>
    <p><strong>Dirección:</strong> <span id="direccion"></span></p>
    <p><strong>Publicado por:</strong> <span id="usuario">UsuarioDemo</span></p>

    <div class="slider">
      <div class="slides" id="slides"></div>
      <button class="slider-btn prev" id="prev-slide">&#10094;</button>
      <button class="slider-btn next" id="next-slide">&#10095;</button>
    </div>

    <div class="calendar-container">
      <h3>Selecciona los días a reservar</h3>
      <div class="calendar-header">
        <button id="prev-month">&lt;</button>
        <span id="month-year"></span>
        <button id="next-month">&gt;</button>
      </div>
      <table class="calendar">
        <thead>
          <tr>
            <th>D</th>
            <th>L</th>
            <th>M</th>
            <th>M</th>
            <th>J</th>
            <th>V</th>
            <th>S</th>
          </tr>
        </thead>
        <tbody id="calendar-body"></tbody>
      </table>
      <p class="precio-total">
        Total: $<span id="total">0</span> 
        
      </p>
      <button id="contratar-btn" style="margin-top:15px;padding:10px 20px;background:#3483fa;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;">
        Contratar
      </button>
    </div>

    <div id="preguntas-container">
      <h3>Preguntas</h3>
      <input type="text" id="pregunta-input" placeholder="Escribe tu pregunta" style="width:70%;padding:5px;">
      <button id="pregunta-btn" style="padding:5px 10px;">Enviar</button>
      <div id="preguntas-list" style="margin-top:10px;"></div>
    </div>
  </main>

<script>
function getQueryParam(param) {
    const params = new URLSearchParams(window.location.search);
    return params.get(param);
}

let index = getQueryParam('id');
const posts = JSON.parse(localStorage.getItem('localiar_posts') || '[]');

if(index === null) {
    index = localStorage.getItem('ver_post_index');
}

const post = posts[index];

document.getElementById('title').textContent = post.title;
document.getElementById('rubro').textContent = post.rubro;
document.getElementById('provincia').textContent = post.provincia;
document.getElementById('direccion').textContent = post.direccion || 'No especificada';
document.getElementById('usuario').textContent = post.usuario || post.email || "Usuario";
// 🔹 Botón editar (solo si es el propietario)
const usuarioActualEdit = localStorage.getItem('usuario_actual');

if(usuarioActualEdit === post.usuario){

    const editarBtn = document.createElement("button");
    editarBtn.textContent = "Editar publicación";
    editarBtn.style.marginTop = "15px";
    editarBtn.style.padding = "10px";
    editarBtn.style.background = "#f0ad4e";
    editarBtn.style.border = "none";
    editarBtn.style.borderRadius = "6px";
    editarBtn.style.cursor = "pointer";

    editarBtn.addEventListener("click", () => {
        window.location.href = `publicar.html?editar=${index}`;
    });

    document.querySelector(".publication-info").appendChild(editarBtn);
}


const descripcionP = document.createElement('p');
descripcionP.innerHTML = `<strong>Descripción:</strong> ${post.descripcion || 'No especificada'}`;
document.querySelector('.publication-info').insertBefore(descripcionP, document.querySelector('.slider'));
// 🔹 Mostrar ID de la publicación (para soporte técnico)
const idP = document.createElement('p');
idP.style.fontSize = "0.85em";
idP.style.color = "#888";
idP.innerHTML = `<strong>ID Publicación:</strong> ${index}`;
document.querySelector('.publication-info').insertBefore(idP, document.querySelector('.slider'));
// 🔹 Comentarios normales (si quieres otros comentarios de usuarios aparte de valoraciones)
if(post.comentarios && post.comentarios.length > 0){
    const comentariosDiv = document.createElement('div');
    comentariosDiv.style.marginTop = "10px";
    comentariosDiv.innerHTML = "<h4>Comentarios generales:</h4>";
    post.comentarios.slice().reverse().forEach(c => {
        const p = document.createElement('p');
        const fecha = new Date(c.fecha);
        p.innerHTML = `<strong>${c.usuario}:</strong> ${c.texto} <span style="font-size:0.8em; color:#888;">(${fecha.toLocaleString()})</span>`;
        comentariosDiv.appendChild(p);
    });
    document.querySelector('.publication-info').appendChild(comentariosDiv);
}
// 🔹 Mostrar comentarios de valoraciones de inquilinos



let disponibilidadGuardada = post.disponibilidad || [];

const slidesContainer = document.getElementById('slides');
let currentSlide = 0;
post.images.forEach((imgSrc,i)=>{
  const img = document.createElement('img');
  img.src = imgSrc;
  if(i===0) img.classList.add('active');
  slidesContainer.appendChild(img);
});
const slides = slidesContainer.querySelectorAll('img');
document.getElementById('prev-slide').addEventListener('click', ()=>{
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide -1 + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
});
document.getElementById('next-slide').addEventListener('click', ()=>{
  slides[currentSlide].classList.remove('active');
  currentSlide = (currentSlide +1) % slides.length;
  slides[currentSlide].classList.add('active');
});

const calendarBody = document.getElementById('calendar-body');
const monthYear = document.getElementById('month-year');
const prevMonthBtn = document.getElementById('prev-month');
const nextMonthBtn = document.getElementById('next-month');
const totalSpan = document.getElementById('total');

let today = new Date();
today.setHours(0,0,0,0);

let currentMonth = today.getMonth();
let currentYear = today.getFullYear();
let selectedDates = [];
const precioPorDia = post.precio || 0;

const months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function renderCalendar(month, year){
  calendarBody.innerHTML="";
  monthYear.textContent=`${months[month]} ${year}`;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let date = 1;

  for(let i=0;i<6;i++){
    const row = document.createElement('tr');
    for(let j=0;j<7;j++){
      const cell = document.createElement('td');
      if(i===0 && j<firstDay){ 
          cell.textContent="";
      } else if(date>daysInMonth){
          cell.textContent="";
      } else {
        cell.textContent = date;
        const cellDate = new Date(year, month, date);
        const formatted = cellDate.toISOString().split('T')[0];
        cellDate.setHours(0,0,0,0);

        if(cellDate < today){
          cell.style.backgroundColor="#d3d3d3";
          cell.style.color="#666";
          cell.style.cursor="not-allowed";
        } else {

          let disponible = false;

if(disponibilidadGuardada.length>0){
  disponible = disponibilidadGuardada.includes(formatted);
} else {
  disponible = true;
}

// 🔴 verificar si la fecha ya está reservada
let reservada = false;
if(post.reservas){
  reservada = post.reservas.some(r => (r.fechas || []).includes(formatted));
}

if(reservada){
  disponible = false;
}

          if(disponible){
            cell.style.backgroundColor="#28a745";
            cell.style.color="#fff";
            cell.style.cursor="pointer";

            cell.addEventListener('click', ()=>{
  if(selectedDates.includes(formatted)){
    cell.style.backgroundColor="#28a745";
    selectedDates = selectedDates.filter(d=>d!==formatted);
  } else {
    cell.style.backgroundColor="#0d6efd";
    selectedDates.push(formatted);
  }

  const subtotal = selectedDates.length * precioPorDia;
  totalSpan.textContent = (subtotal*1.08).toFixed(2);
});

          } else {
            cell.style.backgroundColor="#dc3545";
            cell.style.color="#fff";
            cell.style.cursor="not-allowed";
          }
        }

        date++;
      }
      row.appendChild(cell);
    }
    calendarBody.appendChild(row);
  }
}

prevMonthBtn.addEventListener('click', ()=>{
  currentMonth--;
  if(currentMonth<0){ currentMonth=11; currentYear--; }
  renderCalendar(currentMonth,currentYear);
});
nextMonthBtn.addEventListener('click', ()=>{
  currentMonth++;
  if(currentMonth>11){ currentMonth=0; currentYear++; }
  renderCalendar(currentMonth,currentYear);
});

renderCalendar(currentMonth,currentYear);

document.getElementById('contratar-btn').addEventListener('click', ()=>{
  if(selectedDates.length===0){
    alert("Seleccione al menos un día para continuar.");
    return;
  }

  const subtotal = selectedDates.length * precioPorDia;
  const totalConImpuestos = subtotal*1.08;

  // 1️⃣ Actualizar disponibilidad del post
  disponibilidadGuardada = disponibilidadGuardada.filter(d => !selectedDates.includes(d));
  post.disponibilidad = disponibilidadGuardada;

  // 2️⃣ Guardar reservas del usuario (estado pendiente)
if(!post.reservas) post.reservas = [];

const usuarioActual = localStorage.getItem('usuario_actual');

if(!usuarioActual){
    alert("Debes iniciar sesión para publicar.");
    window.location.href = "login.html";
}

const porcentajeComision = 0.08; // 8%
const montoPropietario = (precioPorDia * (1 - porcentajeComision)) * selectedDates.length;

const nuevaReserva = {
    usuario: usuarioActual,
    fechas: [...selectedDates],
    monto: totalConImpuestos,
    montoPropietario: montoPropietario,
    estado: "pendiente",
    fechaCreacion: Date.now()
};

post.reservas.push(nuevaReserva);

// 3️⃣ Crear notificación para el propietario
if(!post.notificaciones) post.notificaciones = [];

const notificacion = {
    tipo: "reserva",
    usuario: usuarioActual,
    postTitulo: post.title,
    fechas: [...selectedDates],
    monto: montoPropietario,
    fecha: new Date().toISOString(),
    postIndex: index
};

post.notificaciones.push(notificacion);

// 4️⃣ Guardar cambios en localStorage
posts[index] = post;
localStorage.setItem('localiar_posts', JSON.stringify(posts));
  // 5️⃣ Guardar información de la reserva para la página de pago
  localStorage.setItem('reserva_data', JSON.stringify({
    dias: selectedDates,
    cantidadDias: selectedDates.length,
    precioPorDia,
    subtotal,
    total: totalConImpuestos,
    garantia: post.garantia || 0,
    titulo: post.title
  }));

  // 6️⃣ Redirigir a pago
  window.location.href="pago.html";
});


const favoriteBtn = document.getElementById('favorite-btn');
const usuarioActual = localStorage.getItem('usuario_actual');

if(!usuarioActual){
    alert("Debes iniciar sesión para publicar.");
    window.location.href = "login.html";
}
const favoritosKey = `favoritos_${usuarioActual}`;
let favoritos = JSON.parse(localStorage.getItem(favoritosKey) || '[]');

function actualizarCorazon() {
  if(favoritos.includes(index)) {
    favoriteBtn.classList.add('favorito');
    favoriteBtn.innerHTML = '&#9829;';
  } else {
    favoriteBtn.classList.remove('favorito');
    favoriteBtn.innerHTML = '&#9825;';
  }
}

favoriteBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  if(favoritos.includes(index)) {
    favoritos = favoritos.filter(i=>i!==index);
  } else {
    favoritos.push(index);
  }
  localStorage.setItem(favoritosKey, JSON.stringify(favoritos));
  actualizarCorazon();
});

actualizarCorazon();

// 🔹 PREGUNTAS
// 🔹 PREGUNTAS Y COMENTARIOS DE VALORACIONES
const preguntasList = document.getElementById('preguntas-list');
const preguntaInput = document.getElementById('pregunta-input');
const preguntaBtn = document.getElementById('pregunta-btn');
const preguntasContainer = document.getElementById('preguntas-container');

let preguntas = post.preguntas || [];

// 🔹 Mostrar comentarios de valoraciones de inquilinos
function renderValoracionesComentarios() {
    // Eliminar div anterior si existe
    const oldDiv = document.getElementById('valoraciones-comentarios');
    if(oldDiv) oldDiv.remove();

    if(post.valoracionesComentarios && post.valoracionesComentarios.length > 0){
        const valoracionesDiv = document.createElement('div');
        valoracionesDiv.id = 'valoraciones-comentarios';
        valoracionesDiv.style.marginTop = "20px";
        valoracionesDiv.style.padding = "10px";
        valoracionesDiv.style.background = "#f9f9f9";
        valoracionesDiv.style.borderRadius = "8px";
        valoracionesDiv.innerHTML = "<h4>Comentarios de Valoraciones:</h4>";

        post.valoracionesComentarios.slice().reverse().forEach(vc => {
            const p = document.createElement('p');
            const fecha = new Date(vc.fecha);
            p.style.marginBottom = "5px";
            p.innerHTML = `<strong>${vc.usuario}:</strong> ${vc.texto} <br>
                           Estrellas: ${"★".repeat(vc.valoracion)}${"☆".repeat(5-vc.valoracion)}
                           <span style="font-size:0.75em; color:#888;">(${fecha.toLocaleString()})</span>`;
            valoracionesDiv.appendChild(p);
        });

        preguntasContainer.appendChild(valoracionesDiv);
    }
}

function renderPreguntas() {
    preguntasList.innerHTML = "";

    preguntas.slice().reverse().forEach((p, reversedIndex) => { 
        const div = document.createElement('div');
        div.classList.add('pregunta-item');

        const fechaPregunta = new Date(p.fecha);
        div.innerHTML = `<p><strong>${p.usuario}:</strong> ${p.texto} <span class="timestamp">${fechaPregunta.toLocaleString()}</span></p>`;
        
        // Botón responder solo si eres el propietario y la pregunta no está respondida
        if(usuarioActual === post.usuario && !p.respondida){
            const btn = document.createElement('button');
            btn.classList.add('respuesta-btn');
            btn.textContent = "Responder";
            btn.addEventListener('click', ()=>{
                const respuesta = prompt("Escriba su respuesta:");
                if(respuesta){
                    p.respuesta = respuesta;
                    p.respondida = true;
                    p.fechaRespuesta = new Date().toISOString();
                    localStorage.setItem('localiar_posts', JSON.stringify(posts));
                    renderPreguntas();
                }
            });
            div.appendChild(btn);
        }

        // Mostrar respuesta si existe
        if(p.respuesta){
            const fechaResp = new Date(p.fechaRespuesta);
            const pResp = document.createElement('p');
            pResp.style.marginLeft = "10px";
            pResp.innerHTML = `<strong>Respuesta:</strong> ${p.respuesta} <span class="timestamp">${fechaResp.toLocaleString()}</span>`;
            div.appendChild(pResp);
        }

        // Botón eliminar solo propietario
        if(usuarioActual === post.usuario){
            const btnEliminar = document.createElement('button');
            btnEliminar.classList.add('respuesta-btn');
            btnEliminar.style.backgroundColor = "#dc3545";
            btnEliminar.style.marginLeft = "5px";
            btnEliminar.textContent = "Eliminar";

            btnEliminar.addEventListener('click', () => {
                if(confirm("¿Eliminar esta pregunta y su respuesta?")){
                    const originalIndex = preguntas.length - 1 - reversedIndex;
                    preguntas.splice(originalIndex, 1);
                    post.preguntas = preguntas;
                    posts[index] = post;
                    localStorage.setItem('localiar_posts', JSON.stringify(posts));
                    renderPreguntas();
                }
            });
            div.appendChild(btnEliminar);
        }

        preguntasList.appendChild(div);
    });

    // 🔹 Mostrar comentarios de valoraciones de inquilinos
    renderValoracionesComentarios();

    // 🔹 Mostrar comentarios/valoraciones del propietario (opcional)
    
}

// Enviar nueva pregunta
preguntaBtn.addEventListener('click', ()=>{
    const texto = preguntaInput.value.trim();
    if(!texto) return;
    preguntas.push({usuario:usuarioActual, texto, respondida:false, fecha:new Date().toISOString()});
    post.preguntas = preguntas;
    posts[index] = post;
    localStorage.setItem('localiar_posts', JSON.stringify(posts));
    preguntaInput.value = "";
    renderPreguntas();
});

// Inicializar render
renderPreguntas();
renderValoracionesComentarios();

// Botón usuario activo
const userActiveBtn = document.getElementById('user-active-btn');
userActiveBtn.textContent = usuarioActual;
userActiveBtn.addEventListener('click', ()=>{
    window.location.href='usuario.html';
});

</script>
</body>
</html>
